name: Docs Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - ".markdownlint.json"
      - ".markdown-link-check.json"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - ".markdownlint.json"
      - ".markdown-link-check.json"

permissions:
  contents: read

jobs:
  public-oss-hygiene:
    name: Public OSS hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check public OSS hygiene
        run: .github/scripts/check-public-oss-hygiene.sh

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  markdown-link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: .markdown-link-check.json
          folder-path: .
          file-extension: .md
