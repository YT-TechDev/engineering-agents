name: Docs Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - ".markdownlint.json"
      - ".markdown-link-check.json"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - ".markdownlint.json"
      - ".markdown-link-check.json"

permissions:
  contents: read

jobs:
  public-oss-hygiene:
    name: Public OSS hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check public OSS hygiene
        run: .github/scripts/check-public-oss-hygiene.sh

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Collect changed Markdown files
        id: changed-markdown
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="$GITHUB_SHA"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]]; then
            if git rev-parse "${head_sha}^" >/dev/null 2>&1; then
              base_sha="${head_sha}^"
            else
              base_sha="$head_sha"
            fi
          fi

          changed_files=$(git diff --name-only --diff-filter=ACMRT "$base_sha" "$head_sha" -- '*.md' || true)

          if [ -z "$changed_files" ]; then
            echo "No changed Markdown files detected; skipping markdownlint."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed Markdown files:"
          printf '%s\n' "$changed_files"
          {
            echo "files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Run markdownlint
        if: steps.changed-markdown.outputs.files != ''
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            ${{ steps.changed-markdown.outputs.files }}
      - name: Skip markdownlint
        if: steps.changed-markdown.outputs.files == ''
        run: echo "No changed Markdown files to lint."

  markdown-link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: .markdown-link-check.json
          folder-path: .
          file-extension: .md
